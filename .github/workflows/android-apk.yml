name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Lloji i ndërtimit (debug, release, both)'
        required: true
        default: 'debug'
        type: choice
        options:
          - 'debug'
          - 'release'
          - 'both'
      build_bundle:
        description: 'Gjenero edhe Android App Bundle (.aab) për Google Play'
        required: false
        default: false
        type: boolean
      gemini_api_key:
        description: 'Gemini API Key (Opsionale: nëse nuk është vendosur te Repository Secrets)'
        required: false
        type: string

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web App
        env:
          VITE_GEMINI_API_KEY: ${{ inputs.gemini_api_key || secrets.VITE_GEMINI_API_KEY || secrets.GEMINI_API_KEY || vars.VITE_GEMINI_API_KEY || '' }}
          GEMINI_API_KEY: ${{ inputs.gemini_api_key || secrets.GEMINI_API_KEY || secrets.VITE_GEMINI_API_KEY || vars.GEMINI_API_KEY || '' }}
        run: npm run build

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android App (APK/AAB)
        working-directory: ./android
        run: |
          chmod +x gradlew
          
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          BUILD_BUNDLE="${{ github.event.inputs.build_bundle || 'false' }}"
          
          if [ "$BUILD_TYPE" = "debug" ] || [ "$BUILD_TYPE" = "both" ]; then
            echo "--- Po ndërtohet Debug APK ---"
            ./gradlew assembleDebug --stacktrace
          fi
          
          if [ "$BUILD_TYPE" = "release" ] || [ "$BUILD_TYPE" = "both" ]; then
            echo "--- Po ndërtohet Release APK ---"
            ./gradlew assembleRelease --stacktrace
            
            if [ "$BUILD_BUNDLE" = "true" ]; then
              echo "--- Po ndërtohet Release AAB Bundle ---"
              ./gradlew bundleRelease --stacktrace
            fi
          fi

      - name: Upload Built Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NoteBook3-Android-Builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn


